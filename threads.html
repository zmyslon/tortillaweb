<head>
    <title>Tortilla Web - Threads</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg"></div>
    <div class="upperthing">
        <a href="#">
            <img style="width: 165px;" src="tortillaweb.png" alt="tortilla web">
        </a>

        <div class="title-area">
            <h3>yes this is a website</h3>
            <button class="b0" onclick="window.location.href='index.html'">Home</button>
            <button class="b0" onclick="window.location.href='upload.html'">Upload</button>
            <button class="b0" onclick="window.location.href='threads.html'">Threads</button>
            <button class="b0" onclick="window.location.href='news.html'">Updates</button>
        </div>
    </div>
    <br><br><br><br>
    
    <!-- 1. Create a Thread Section -->
    <div>
        <h2>Create a new thread</h2>
        <input type="text" id="newtr" placeholder="Thread title">
        <button class="b0" onclick="createThread()">Create a new thread</button>
    </div>
    
    <hr>
    
    <!-- 2. Display Threads Section -->
    <h2>Look at other threads:</h2>
    <div id="thread-list">
        <h3 style="color: hotpink;">Loading threads...</h3>
    </div>

    <script type="module">
        import { initializeApp } from 
        "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import {
        getDatabase,
        ref,
        push,
        onValue
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
        apiKey: "AIzaSyBHPj2CSQH9U1sCM-A-Cr9hc80dG_rRjLs",
        authDomain: "twdata-989ec.firebaseapp.com",
        databaseURL: "https://twdata-989ec-default-rtdb.firebaseio.com",
        projectId: "twdata-989ec",
        storageBucket: "twdata-989ec.firebasestorage.app",
        messagingSenderId: "1027351113381",
        appId: "1:1027351113381:web:c811813a4b9d23b05d274c",
        measurementId: "G-1DHF5K1NS1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- Task 1: Create a new Thread ---
        function createThread() {
            const input = document.getElementById("newtr");
            const titleText = input.value.trim();

            if (titleText !== "") {
                // Save the thread title into '/threads'
                push(ref(db, "threads"), {
                    title: titleText
                })
                .then(() => {
                    input.value = ""; // Clear input field on success
                })
                .catch((error) => console.error("Database Error:", error));
            }
        }

        // --- Task 2: List existing threads ---
        onValue(ref(db, "threads"), snapshot => {
            const data = snapshot.val();
            let html = "";

            if (data) {
                for (let id in data) {
                    // Clicking a link takes you to index.html?thread=UNIQUE_ID
                    // Change ${id} to ${data[id].title}
                    html += `
                        <div style="margin: 10px 0;">
                            <a href="index.html?thread=${encodeURIComponent(data[id].title)}" style="color: hotpink; font-size: 20px; text-decoration: none; font-weight: bold;">
                                ${data[id].title}
                            </a>
                        </div>
                    `;
                }
            } else {
                html = "<p>No threads created yet.</p><hr>";
                
            }

            document.getElementById("thread-list").innerHTML = html;
        });

        // Expose function so the HTML button onclick can find it
        window.createThread = createThread;

        // Background canvas code
        const images = [
            "arrowleft.png",
            "arrowright.png",
            "arrowup.png",
            "arrowdown.png"
        ];
        const size = 50;

        const bg = document.getElementById("bg");
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        bg.appendChild(canvas);

        const loaded = images.map(src => {
            const img = new Image();
            img.src = src;
            return img;
        });

        function draw() {
            for (let y = 0; y < canvas.height; y += size) {
                for (let x = 0; x < canvas.width; x += size) {
                    const img = loaded[Math.floor(Math.random() * loaded.length)];
                    ctx.drawImage(img, x, y, size, size);
                }
            }
        }

        window.onload = () => {
            setTimeout(draw, 100);
        };
    </script>
</body>
